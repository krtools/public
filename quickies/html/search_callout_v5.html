
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/caveat@5/index.css">
<style>
  .wrap { padding: 2rem 2.5rem 3rem; }
  .bar-row { position: relative; }
  .search-bar {
    width: 100%; height: 40px; box-sizing: border-box;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 8px;
    display: flex; align-items: center; padding: 0 14px;
    color: var(--color-text-secondary); font-size: 14px;
  }
  .toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 6px;
  }
  .toggle-track {
    width: 44px; height: 22px; border-radius: 11px;
    background: #534AB7; position: relative;
  }
  .toggle-thumb {
    position: absolute; top: 3px; right: 3px;
    width: 16px; height: 16px; border-radius: 50%; background: white;
  }
  .toggle-label {
    font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
    letter-spacing: 0.04em;
  }
  .below { position: relative; height: 100px; }
  .handwritten {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--color-text-secondary);
    opacity: 0.7;
    position: absolute;
    right: 90px;
    top: 36px;
    white-space: nowrap;
  }
  .arrow-overlay {
    position: absolute;
    stroke: black;
    top: -40px; right: 0;
    width: 160px; height: 140px;
    pointer-events: none;
    overflow: visible;
  }
</style>

<div class="wrap">
  <div class="bar-row">
    <div class="search-bar">Search...</div>
    <div class="toggle">
      <span class="toggle-label">New</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>

  <div class="below">
    <div class="handwritten">try our new search bar!</div>

    <svg class="arrow-overlay" viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <path
        d="M 46 100  C 96 100, 128 88, 128 46"
        stroke="var(--color-text-secondary)"
        stroke-width="1.5"
        fill="none"
        stroke-linecap="round"
        opacity="0.5"
        marker-end="url(#ah)"
      />
    </svg>
  </div>
</div>
